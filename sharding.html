<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MongoDB Sharding Explained</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A1628; font-family: Georgia, serif; color: #E8F4FF; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const green = "#00ED64";
const bg = "#0A1628";
const card = "#0F1F3D";
const cardBorder = "#1A3560";
const text = "#E8F4FF";
const muted = "#7A9CC0";

const mongoLeafSvg = '<svg width="22" height="22" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 13 C128 13 61 88.5 61 152 C61 188 91.5 217 128 217 C164.5 217 195 188 195 152 C195 88.5 128 13 128 13Z" fill="#00ED64"/><rect x="122" y="210" width="12" height="40" rx="6" fill="#00ED64"/></svg>';
const mongoLeafSmall = '<svg width="16" height="16" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 13 C128 13 61 88.5 61 152 C61 188 91.5 217 128 217 C164.5 217 195 188 195 152 C195 88.5 128 13 128 13Z" fill="#00ED64"/><rect x="122" y="210" width="12" height="40" rx="6" fill="#00ED64"/></svg>';

const sections = [
  {
    id: "what", label: "What is Sharding?", icon: "📊",
    headline: "Horizontal scaling for massive data",
    body: "Sharding is MongoDB's approach to horizontal scaling — distributing data across multiple servers (shards) so no single machine becomes a bottleneck. Each shard holds a subset of the data, and together they act as one logical database.",
    callout: null, visual: "shards", values: null
  },
  {
    id: "how", label: "How It Works", icon: "⚙️",
    headline: "Shard keys route every operation",
    body: "Every document is routed to a shard based on a shard key — a field (or compound field) you choose. The mongos router inspects the shard key and directs reads and writes to the right shard, transparently. Clients connect to mongos, never directly to shards.",
    callout: "Choosing the right shard key is the most important architectural decision in a sharded deployment.",
    visual: "routing", values: null
  },
  {
    id: "why", label: "Why It Matters", icon: "💡",
    headline: "Why customers invest in sharding",
    body: null, callout: null, visual: "value",
    values: [
      { title: "Unlimited Scale", desc: "Add shards as data grows. No hard ceiling on storage or throughput.", icon: "∞" },
      { title: "High Throughput", desc: "Reads and writes are parallelized across shards, multiplying capacity.", icon: "⚡" },
      { title: "Geographic Distribution", desc: "Zone sharding pins data to regions — compliance, latency, data residency.", icon: "🌍" },
      { title: "Operational Continuity", desc: "Each shard is a replica set. Hardware failure doesn't take down the cluster.", icon: "🛡️" }
    ]
  },
  {
    id: "types", label: "Shard Key Strategies", icon: "🗺️",
    headline: "Picking the right shard key",
    body: "The shard key determines data distribution. A poor choice leads to hotspots — one shard handling all the traffic. The goal is even distribution with query isolation.",
    callout: null, visual: "single-node",
    values: [
      { title: "Hashed Sharding", desc: "MongoDB hashes the key value. Even distribution, but range queries scatter across shards.", icon: "#" },
      { title: "Ranged Sharding", desc: "Documents with similar key values land on the same shard. Great for range queries.", icon: "↔️" },
      { title: "Zone Sharding", desc: "Assign ranges to specific shards. Enables geographic and compliance-driven placement.", icon: "📍" }
    ]
  },
  {
    id: "atlas", label: "Sharding on Atlas", icon: "☁️",
    headline: "MongoDB Atlas makes sharding operational",
    body: "Atlas handles the operational complexity of sharding — provisioning mongos routers, balancing chunks, monitoring hotspots, and scaling shards. You choose your shard key and tier; Atlas does the rest.",
    callout: "Atlas Global Clusters extend zone sharding to a point-and-click UI, pinning data to cloud regions for compliance and latency without manual config.",
    visual: "single-node", values: null
  },
  {
    id: "discovery", label: "Discovery Questions", icon: "🔍",
    headline: "Discovery Questions",
    body: null, callout: null, visual: "discovery", values: null
  }
];

const discoveryQs = [
  {
    icon: "💥",
    title: "Current Scale & Pain",
    qs: [
      "How large is your dataset today, and what's your projected growth rate over the next 12–24 months?",
      "Are you hitting performance walls — slow queries, high latency, or storage limits — on your current deployment?",
      "Have you ever had to archive or delete data just to keep your primary cluster manageable?",
      "What happens to your application when your database server is under peak load?"
    ]
  },
  {
    icon: "🔧",
    title: "Architecture & Data Model",
    qs: [
      "How is your data currently structured — do you have one large collection that dominates read/write traffic?",
      "Have you thought about what field you'd use as a shard key? What does your most common query pattern look like?",
      "Do you have any requirements to keep certain data in specific regions — for compliance, latency, or data residency?",
      "Are your workloads read-heavy, write-heavy, or mixed? Do you have any time-series or append-only patterns?"
    ]
  },
  {
    icon: "🏢",
    title: "Operational Concerns",
    qs: [
      "Who manages your database infrastructure today? Do they have experience operating a sharded cluster?",
      "How much time does your team spend on database capacity planning and scaling operations?",
      "Have you experienced any outages or degradation caused by hitting the limits of a single-node deployment?",
      "What does your current backup, monitoring, and alerting setup look like for your database?"
    ]
  },
  {
    icon: "🚀",
    title: "Future State & Strategic Direction",
    qs: [
      "If you could scale your database infinitely without operational overhead, what new workloads or features would you build?",
      "Are you considering a move to the cloud, or expanding to multiple regions? How does your database strategy support that?",
      "What's driving the timeline — is there a product launch, a compliance deadline, or a capacity ceiling you're approaching?",
      "How important is it that your developers use the same query language and data model at any scale?"
    ]
  }
];

function ShardViz() {
  return (
    <div style={{display:"flex",gap:8,alignItems:"flex-end",justifyContent:"center",padding:"24px 0"}}>
      {["Shard 0","Shard 1","Shard 2"].map((s) => (
        <div key={s} style={{textAlign:"center"}}>
          <div style={{width:80,background:card,border:`1px solid ${cardBorder}`,borderRadius:6,overflow:"hidden",marginBottom:6}}>
            {[0.7,0.4,0.85,0.3,0.6].map((h,j)=>(
              <div key={j} style={{height:Math.round(h*24),background:`${green}${["44","66","88","44","66"][j]}`,borderBottom:`1px solid ${bg}`}}></div>
            ))}
          </div>
          <div style={{fontSize:10,color:muted,fontStyle:"italic"}}>{s}</div>
        </div>
      ))}
    </div>
  );
}

function RoutingViz() {
  return (
    <div style={{padding:"20px 0",textAlign:"center"}}>
      <div style={{display:"inline-block",padding:"8px 20px",background:`${green}22`,border:`1px solid ${green}`,borderRadius:6,fontSize:12,color:green,fontStyle:"italic",marginBottom:12}}>mongos router</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
        {[0,1,2].map(i=><div key={i} style={{width:1,height:20,background:cardBorder,margin:"0 28px"}}></div>)}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        {["Shard 0","Shard 1","Shard 2"].map(s=>(
          <div key={s} style={{padding:"6px 14px",background:card,border:`1px solid ${cardBorder}`,borderRadius:6,fontSize:11,color:muted,fontStyle:"italic"}}>{s}</div>
        ))}
      </div>
    </div>
  );
}

function ValueGrid({values}) {
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16}}>
      {values.map(v=>(
        <div key={v.title} style={{background:bg,border:`1px solid ${cardBorder}`,borderRadius:6,padding:16}}>
          <div style={{fontSize:20,marginBottom:8}}>{v.icon}</div>
          <div style={{fontFamily:"Georgia, serif",fontSize:14,fontWeight:700,marginBottom:4}}>{v.title}</div>
          <div style={{color:muted,fontSize:12,lineHeight:1.6,fontStyle:"italic"}}>{v.desc}</div>
        </div>
      ))}
    </div>
  );
}

function DiscoverySection() {
  const [openIdx, setOpenIdx] = React.useState(0);
  const [tooltip, setTooltip] = React.useState({ show: false, x: 0, y: 0 });

  React.useEffect(() => {
    const move = e => setTooltip(t => ({ ...t, x: e.clientX + 12, y: e.clientY - 8 }));
    window.addEventListener("mousemove", move);
    return () => window.removeEventListener("mousemove", move);
  }, []);

  function copyQ(q) {
    navigator.clipboard.writeText(q);
    setTooltip(t => ({ ...t, show: true }));
    setTimeout(() => setTooltip(t => ({ ...t, show: false })), 1500);
  }

  return (
    <div>
      {tooltip.show && (
        <div style={{position:"fixed",background:green,color:bg,fontSize:11,padding:"6px 14px",borderRadius:3,pointerEvents:"none",fontFamily:"Georgia, serif",fontStyle:"italic",fontWeight:"bold",zIndex:1000,left:tooltip.x,top:tooltip.y}}>Copied!</div>
      )}
      <div style={{background:"rgba(0,237,100,0.06)",border:"1px solid rgba(0,237,100,0.25)",borderLeft:`3px solid ${green}`,borderRadius:"0 6px 6px 0",padding:"16px 20px",marginBottom:24}}>
        <p style={{color:muted,fontSize:13,lineHeight:1.7,fontStyle:"italic"}}>Use these questions to uncover pain, quantify impact, and build urgency. Hover any question and click <strong style={{color:text,fontStyle:"normal"}}>copy</strong> to grab it for your call notes.</p>
      </div>
      {discoveryQs.map((sec, i) => (
        <div key={i} style={{marginBottom:12}}>
          <div onClick={() => setOpenIdx(openIdx === i ? -1 : i)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",background:openIdx===i?"rgba(0,237,100,0.04)":card,border:`1px solid ${openIdx===i ? "rgba(0,237,100,0.3)" : cardBorder}`,borderRadius:openIdx===i?"6px 6px 0 0":"6px",cursor:"pointer",transition:"all 0.2s",userSelect:"none"}}>
            <span style={{fontSize:18}}>{sec.icon}</span>
            <span style={{fontFamily:"Georgia, serif",fontSize:15,fontWeight:"bold",flex:1}}>{sec.title}</span>
            <span style={{color:muted,fontSize:11,fontStyle:"italic"}}>{sec.qs.length} questions</span>
            <span style={{color:muted,fontSize:12}}>{openIdx===i ? "▲" : "▼"}</span>
          </div>
          {openIdx === i && (
            <div style={{border:"1px solid rgba(0,237,100,0.3)",borderTop:"none",borderRadius:"0 0 6px 6px",background:"rgba(0,237,100,0.02)"}}>
              {sec.qs.map((q, j) => (
                <div key={j}
                  style={{display:"flex",gap:12,alignItems:"flex-start",padding:"14px 20px",borderBottom:j<sec.qs.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}
                  onMouseEnter={e => e.currentTarget.style.background="rgba(0,237,100,0.05)"}
                  onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                  <span style={{width:6,height:6,background:green,borderRadius:"50%",flexShrink:0,marginTop:7,display:"inline-block"}}></span>
                  <span style={{fontSize:13,color:text,lineHeight:1.65,flex:1,fontStyle:"italic"}}>"{q}"</span>
                  <button onClick={() => copyQ(q)}
                    style={{flexShrink:0,padding:"4px 10px",background:"transparent",border:`1px solid ${cardBorder}`,color:muted,fontFamily:"Georgia, serif",fontSize:10,cursor:"pointer",borderRadius:3,letterSpacing:"0.05em",fontStyle:"italic"}}
                    onMouseEnter={e => { e.currentTarget.style.borderColor=green; e.currentTarget.style.color=green; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor=cardBorder; e.currentTarget.style.color=muted; }}>
                    copy
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState("what");
  const section = sections.find(s => s.id === active);

  return (
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"Georgia, serif",display:"flex",flexDirection:"column"}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
        a{color:#7A9CC0;text-decoration:none;}
        a:hover{color:#00ED64;}
      `}</style>

      {/* NAV */}
      <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 40px",borderBottom:`1px solid ${cardBorder}`,background:"rgba(10,22,40,0.95)",position:"sticky",top:0,zIndex:100,width:"100%",boxSizing:"border-box"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{display:"flex",alignItems:"center"}} dangerouslySetInnerHTML={{__html:mongoLeafSvg}} />
          <span style={{color:green,fontFamily:"Georgia, serif",fontSize:14,fontStyle:"italic",letterSpacing:"0.05em"}}>MongoDB Atlas</span>
        </div>
        <div style={{display:"flex",gap:24}}>
          <a href="./index.html" style={{color:muted,fontSize:13,fontStyle:"italic"}}>&#8592; All Concepts</a>
          <a href="./workload-isolation.html" style={{color:muted,fontSize:13,fontStyle:"italic"}}>Workload Isolation</a>
        </div>
      </nav>

      {/* HERO */}
      <div style={{padding:"60px 40px 40px",maxWidth:760,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,fontSize:12,letterSpacing:"0.2em",textTransform:"uppercase",color:muted,marginBottom:20,fontStyle:"italic"}}>
          <span style={{width:6,height:6,background:green,borderRadius:"50%",animation:"pulse 2s ease infinite",display:"inline-block"}}></span>
          Solutions Architecture
        </div>
        <h1 style={{fontFamily:"Georgia, serif",fontSize:"clamp(42px, 6vw, 72px)",fontWeight:"bold",lineHeight:1.05,letterSpacing:"-0.02em",marginBottom:20}}>
          MongoDB <span style={{color:green}}>Sharding</span>
        </h1>
        <p style={{fontSize:15,color:muted,lineHeight:1.8,maxWidth:560,fontStyle:"italic"}}>
          A walkthrough of MongoDB's horizontal scaling strategy — what it is, how it works, and why it matters for your business.
        </p>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:760,width:"100%",padding:"0 40px 60px",boxSizing:"border-box",margin:"0 auto"}}>

        {/* Section tabs */}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
          {sections.map(s=>(
            <button key={s.id} onClick={()=>setActive(s.id)} style={{background:active===s.id?`${green}22`:"transparent",border:`1px solid ${active===s.id?green:cardBorder}`,borderRadius:6,padding:"6px 14px",color:active===s.id?green:muted,fontSize:12,fontFamily:"Georgia, serif",cursor:"pointer",fontWeight:active===s.id?700:400,fontStyle:"italic",transition:"all 0.2s"}}>
              {s.icon} {s.label}
            </button>
          ))}
        </div>

        {/* Section card */}
        <div style={{background:card,border:`1px solid ${cardBorder}`,borderRadius:8,padding:32}}>
          <div style={{fontSize:11,color:green,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:12,fontStyle:"italic"}}>{section.label}</div>
          <h2 style={{fontFamily:"Georgia, serif",fontSize:26,fontWeight:"bold",marginBottom:16,letterSpacing:"-0.01em"}}>{section.headline}</h2>

          {section.visual === "shards" && <ShardViz />}
          {section.visual === "routing" && <RoutingViz />}
          {section.visual === "discovery" && <DiscoverySection />}

          {section.body && (
            <p style={{color:muted,fontSize:14,lineHeight:1.8,marginBottom:section.callout||section.values?20:0,fontStyle:"italic"}}>{section.body}</p>
          )}

          {section.callout && (
            <div style={{borderLeft:`3px solid ${green}`,paddingLeft:16,marginBottom:section.values?20:0}}>
              <p style={{color:text,fontSize:13,lineHeight:1.7,fontStyle:"italic"}}>{section.callout}</p>
            </div>
          )}

          {section.values && <ValueGrid values={section.values} />}
        </div>
      </div>

      {/* FOOTER */}
      <div style={{borderTop:`1px solid ${cardBorder}`,padding:"28px 40px",display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:760,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{opacity:0.5,display:"flex",alignItems:"center"}} dangerouslySetInnerHTML={{__html:mongoLeafSmall}} />
          <span style={{fontSize:12,color:muted,fontStyle:"italic"}}>MongoDB Atlas &mdash; Sharding</span>
        </div>
        <span style={{fontSize:12,color:cardBorder,fontStyle:"italic"}}>Solutions Architecture</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
