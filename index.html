<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MongoDB Concepts — Solutions Architecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0A1628; font-family: Georgia, serif; color: #E8F4FF; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const green = "#00ED64";
const bg = "#0A1628";
const card = "#0F1F3D";
const cardBorder = "#1A3560";
const text = "#E8F4FF";
const muted = "#7A9CC0";

const mongoLeafSvg = '<svg width="22" height="22" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 13 C128 13 61 88.5 61 152 C61 188 91.5 217 128 217 C164.5 217 195 188 195 152 C195 88.5 128 13 128 13Z" fill="#00ED64"/><rect x="122" y="210" width="12" height="40" rx="6" fill="#00ED64"/></svg>';
const mongoLeafSmall = '<svg width="16" height="16" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 13 C128 13 61 88.5 61 152 C61 188 91.5 217 128 217 C164.5 217 195 188 195 152 C195 88.5 128 13 128 13Z" fill="#00ED64"/><rect x="122" y="210" width="12" height="40" rx="6" fill="#00ED64"/></svg>';

const concepts = [
  {
    num: "01", icon: "🔵", category: "High Availability", title: "Replica Sets",
    desc: "How MongoDB ensures automatic failover, data redundancy, and zero-downtime maintenance — the foundation of every production deployment.",
    tags: ["High Availability", "Automatic Failover", "Oplog", "Write Concerns"],
    href: "./replica-set.html"
  },
  {
    num: "02", icon: "⚡", category: "Scalability", title: "Sharding",
    desc: "How MongoDB distributes data horizontally across shards — and why it matters for scale-out architectures.",
    tags: ["Horizontal Scale", "Data Distribution", "Shard Keys", "Zone Sharding"],
    href: "./sharding.html"
  },
  {
    num: "03", icon: "🔵", category: "Performance", title: "Workload Isolation",
    desc: "Run OLTP, analytics, search, and reporting simultaneously — without any workload degrading another.",
    tags: ["Analytics Nodes", "Atlas Search", "Online Archive", "SLA Protection"],
    href: "./workload-isolation.html"
  }
];

function Card({ c, hovered, onEnter, onLeave }) {
  return (
    <a href={c.href} style={{
      display: "block", textDecoration: "none", color: text,
      background: hovered ? "#0e1f38" : card,
      border: `1px solid ${hovered ? green + "44" : cardBorder}`,
      borderRadius: 8, padding: 40, position: "relative", overflow: "hidden",
      transition: "all 0.25s"
    }} onMouseEnter={onEnter} onMouseLeave={onLeave}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: green, transform: hovered ? "scaleX(1)" : "scaleX(0)", transformOrigin: "left", transition: "transform 0.35s ease" }}></div>
      {hovered && <div style={{ position: "absolute", inset: 0, background: "linear-gradient(135deg, rgba(0,237,100,0.04) 0%, transparent 60%)", pointerEvents: "none" }}></div>}
      <div style={{ fontSize: 11, color: muted, letterSpacing: "0.15em", marginBottom: 24, display: "flex", alignItems: "center", gap: 8, fontStyle: "italic" }}>
        <span style={{ display: "inline-block", width: 24, height: 1, background: muted }}></span>{c.num}
      </div>
      <div style={{ fontSize: 36, marginBottom: 16, display: "block", transition: "transform 0.3s", transform: hovered ? "scale(1.1) rotate(-3deg)" : "scale(1)" }}>{c.icon}</div>
      <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: green, marginBottom: 10, fontStyle: "italic" }}>{c.category}</div>
      <div style={{ fontFamily: "Georgia, serif", fontSize: 26, fontWeight: "bold", letterSpacing: "-0.02em", marginBottom: 12, lineHeight: 1.1 }}>{c.title}</div>
      <p style={{ fontSize: 13, color: muted, lineHeight: 1.8, marginBottom: 28, fontStyle: "italic" }}>{c.desc}</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 32 }}>
        {c.tags.map(tag => (
          <span key={tag} style={{ padding: "4px 10px", border: `1px solid ${hovered ? green + "33" : cardBorder}`, fontSize: 10, letterSpacing: "0.08em", color: hovered ? green + "bb" : muted, borderRadius: 3, fontStyle: "italic", transition: "all 0.2s" }}>{tag}</span>
        ))}
      </div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: hovered ? 14 : 8, fontSize: 13, color: green, fontStyle: "italic", transition: "gap 0.2s" }}>
        Open guide <span style={{ transform: hovered ? "translateX(4px)" : "none", transition: "transform 0.2s", display: "inline-block" }}>→</span>
      </div>
    </a>
  );
}

function App() {
  const [hovered, setHovered] = React.useState(null);
  return (
    <div style={{ background: bg, minHeight: "100vh", fontFamily: "Georgia, serif", color: text }}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
        @keyframes gridDrift { 0%{background-position:0 0} 100%{background-position:48px 48px} }
      `}</style>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, backgroundImage: "linear-gradient(rgba(0,237,100,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,237,100,0.03) 1px, transparent 1px)", backgroundSize: "48px 48px", animation: "gridDrift 20s linear infinite" }}></div>
      <div style={{ position: "fixed", width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,237,100,0.05) 0%, transparent 70%)", top: -150, right: -150, pointerEvents: "none", zIndex: 0 }}></div>
      <div style={{ position: "relative", zIndex: 1 }}>
        <nav style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 40px", borderBottom: `1px solid ${cardBorder}`, background: "rgba(10,22,40,0.95)", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ display: "flex", alignItems: "center" }} dangerouslySetInnerHTML={{ __html: mongoLeafSvg }} />
            <span style={{ color: green, fontFamily: "Georgia, serif", fontSize: 14, fontStyle: "italic", letterSpacing: "0.05em" }}>MongoDB Atlas</span>
          </div>
          <span style={{ fontSize: 12, color: muted, fontStyle: "italic", letterSpacing: "0.08em" }}>Solutions Architecture</span>
        </nav>
        <div style={{ padding: "80px 40px 60px", maxWidth: 860, margin: "0 auto", textAlign: "center" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 12, letterSpacing: "0.2em", textTransform: "uppercase", color: muted, marginBottom: 24, fontStyle: "italic" }}>
            <span style={{ width: 6, height: 6, background: green, borderRadius: "50%", animation: "pulse 2s ease infinite", display: "inline-block" }}></span>
            Interactive explainers
          </div>
          <h1 style={{ fontFamily: "Georgia, serif", fontSize: "clamp(48px, 7vw, 80px)", fontWeight: "bold", lineHeight: 0.95, letterSpacing: "-0.03em", marginBottom: 28 }}>
            MongoDB<br /><span style={{ color: green }}>Concepts</span>
          </h1>
          <p style={{ fontSize: 15, color: muted, maxWidth: 480, margin: "0 auto", lineHeight: 1.8, fontStyle: "italic", borderLeft: `2px solid ${cardBorder}`, paddingLeft: 16, textAlign: "left" }}>
            Hands-on, interactive guides for customer conversations. Built for solutions architects.
          </p>
        </div>
        <div style={{ height: 1, background: `linear-gradient(90deg, ${green} 0%, transparent 60%)`, opacity: 0.2, maxWidth: 860, margin: "0 auto 48px", padding: "0 40px" }}></div>
        <div style={{ maxWidth: 860, margin: "0 auto", padding: "0 40px 80px" }}>
          <div style={{ fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: muted, marginBottom: 24, fontStyle: "italic" }}>Available Guides</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {concepts.map((c, i) => (
              <Card key={i} c={c} hovered={hovered === i} onEnter={() => setHovered(i)} onLeave={() => setHovered(null)} />
            ))}
          </div>
        </div>
        <div style={{ borderTop: `1px solid ${cardBorder}`, padding: "28px 40px", display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: 860, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ opacity: 0.5, display: "flex", alignItems: "center" }} dangerouslySetInnerHTML={{ __html: mongoLeafSmall }} />
            <span style={{ fontSize: 12, color: muted, fontStyle: "italic" }}>MongoDB Atlas · Solutions Architecture</span>
          </div>
          <span style={{ fontSize: 12, color: cardBorder, fontStyle: "italic" }}>kavyashivashankar.github.io/mongodbconcepts</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
