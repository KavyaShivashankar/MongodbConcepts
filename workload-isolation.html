  const [cpu, setCpu] = React.useState(32);

  const [memColor, setMemColor] = React.useState("#4DB8FF");
  const [ioColor, setIoColor] = React.useState("#FFB347");
  const [appLatency, setAppLatency] = React.useState("4ms avg");
  const [appLatencyColor, setAppLatencyColor] = React.useState(green);
  const [analyticsStatus, setAnalyticsStatus] = React.useState("Idle");
  const [analyticsColor, setAnalyticsColor] = React.useState(muted);
  const [reportStatus, setReportStatus] = React.useState("Normal");
  const [reportColor, setReportColor] = React.useState(green);
  const [selectedSol, setSelectedSol] = React.useState(null);
  const [openQ, setOpenQ] = React.useState(0);
  const [tooltip, setTooltip] = React.useState({ show: false, x: 0, y: 0 });

    const move = e => setTooltip(t => ({ ...t, x: e.clientX + 12, y: e.clientY - 8 }));
    window.addEventListener("mousemove", move);
    return () => window.removeEventListener("mousemove", move);
  }, []);

  function simulate() {
    if (simRunning) return;
    setSimRunning(true);
    setAnalyticsStatus("Running..."); setAnalyticsColor("#FFB347");
    setCpu(89); setMem(92); setIo(96);
    setCpuColor("#FF6B6B"); setMemColor("#FF6B6B"); setIoColor("#FF6B6B");
    setTimeout(() => {
      setStressed(true);
      setAppLatency("847ms avg"); setAppLatencyColor("#FF6B6B");
      setReportStatus("Queued"); setReportColor("#FFB347");
    }, 800);
    setTimeout(() => {
      setStressed(false);
      setSimRunning(false);
      setAppLatency("4ms avg"); setAppLatencyColor(green);
      setAnalyticsStatus("Idle"); setAnalyticsColor(muted);
      setReportStatus("Normal"); setReportColor(green);
      setCpu(32); setMem(28); setIo(15);
      setCpuColor(green); setMemColor("#4DB8FF"); setIoColor("#FFB347");
    }, 4500);
  }

  function copyQ(txt, e) {
    navigator.clipboard.writeText(txt);
    setTooltip(t => ({ ...t, show: true }));
    setTimeout(() => setTooltip(t => ({ ...t, show: false })), 1500);
  }

  const solutions = [
    { icon: "🔵", name: "Analytics Nodes", badge: "Atlas Cluster", desc: "Dedicated replica set members tagged exclusively for analytical workloads. Zero ETL, always fresh data.", details: ["Reads routed via read preference tags — never touch primary", "Size independently from M0–M700 for analytics, not OLTP", "Replication lag typically under 1 second — effectively real-time", "No code changes needed — just update connection string read preference"] },
    { icon: "🟡", name: "Atlas Search", badge: "Search Nodes", desc: "Lucene-based full-text and vector search on dedicated mongot processes — isolated from CRUD.", details: ["Search indexes managed by mongot — not the mongod handling writes", "Supports fuzzy, semantic (vector), faceted, and hybrid search", "Search tier scales independently from your database tier", "No separate Elasticsearch cluster to sync and maintain"] },
    { icon: "🟢", name: "Online Archive", badge: "Data Tiering", desc: "Auto-tier cold data to object storage. Keep hot data in Atlas, query everything with the same driver.", details: ["Define archival rules by date or custom field — fully automated", "Archived data in Atlas-managed S3-compatible object storage", "Query hot + cold data transparently via Data Federation", "Keeps operational cluster lean, reducing IOPS costs significantly"] },
    { icon: "🔴", name: "Data Federation", badge: "Federated Queries", desc: "Query across Atlas clusters, Online Archive, S3, and HTTP sources — without moving data.", details: ["Federated endpoint runs on Atlas infrastructure, not your cluster", "MQL and $lookup across heterogeneous sources in a single query", "Supports CSV, JSON, Parquet, BSON in S3 alongside live Atlas data", "Great for data mesh patterns — each domain exposes its own cluster"] },
  ];

  const qSections = [
    { icon: "💥", title: "Current Pain & Performance", qs: [
      "When your analytics team runs heavy queries, what happens to your application response times — and who feels it first?",
      "Do you have SLAs on your transactional workload? How often do you breach them, and what's typically the cause?",
      "Has a reporting job or batch process ever caused a production incident? What was the business impact?",
      "Are there workloads you're not running today because you're worried they'd impact production?"
    ]},
    { icon: "🔧", title: "Data Pipeline Complexity", qs: [
      "How are you currently getting operational data to your BI or reporting tools? Walk me through that pipeline.",
      "How fresh is the data your analysts are working with — and has data staleness ever caused a bad business decision?",
      "What's the engineering cost to build and maintain your ETL or replication pipelines today — in time and people?",
      "How many separate databases are you managing to serve different teams — and what's the cost of keeping them in sync?"
    ]},
    { icon: "🏢", title: "Organizational & Team Friction", qs: [

      "When a business stakeholder asks 'why is the app slow right now' — how do you diagnose and explain what's happening?",
      "Are your developers having to learn and maintain multiple query languages or SDKs to serve different workload types?"

    { icon: "🚀", title: "Future State & Strategic Direction", qs: [
      "As your data volumes grow, how are you thinking about scaling your analytics independently from your transactional layer?",
      "If your analysts could query live operational data with zero risk to production, how would that change what they're able to build?",
      "Are you considering a data warehouse or lakehouse? Is that driven by a capability gap, or isolation concerns you're trying to solve?",
      "If you could collapse three separate infrastructure stacks into one platform with guaranteed workload isolation — what would that be worth in the next 12 months?"
    ]}
  ];

                  <div style={styles.barTrack}><div style={barStyle(val, color)}></div></div>

              ))}
              <div style={styles.wCards}>
                <div style={wCardStyle(stressed, false)}>
                  <div style={styles.wCardIcon}>⚡</div>
                  <div style={styles.wCardName}>App Transactions</div>
                  <div style={styles.wCardStat}>OLTP — high frequency</div>
                  <div style={{ ...styles.wCardLatency, color: appLatencyColor }}>{appLatency}</div>
                </div>
                <div style={wCardStyle(stressed, false)}>
                  <div style={styles.wCardIcon}>📊</div>
                  <div style={styles.wCardName}>Reporting / BI</div>
                  <div style={styles.wCardStat}>Long-running reads</div>
                  <div style={{ ...styles.wCardLatency, color: reportColor }}>{reportStatus}</div>

                <div style={wCardStyle(false, simRunning)}>

                  <div style={{ ...styles.wCardLatency, color: analyticsColor }}>{analyticsStatus}</div>

            </div>

            <div style={styles.calloutRow}>
              {[["10×", "Latency spike on OLTP transactions when a single unoptimized analytics query hits the same cluster"],

                ["24h", "Average data lag analysts experience when working from warehouse exports instead of live data"]

                <div key={num} style={styles.callout}>
                  <div style={styles.calloutNum}>{num}</div>
                  <div style={styles.calloutText}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TAB 1: SOLUTION */}
        {activeTab === 1 && (
          <div>
            <div style={styles.sectionTitle}>Atlas Workload Isolation Capabilities</div>
            <p style={styles.sectionSub}>Click each capability to explore how it works.</p>
            <div style={styles.grid2}>
              {solutions.map((s, i) => (
                <div key={i} onClick={() => setSelectedSol(selectedSol === i ? null : i)}
                  style={{ ...styles.infoCard, borderColor: selectedSol === i ? `${green}55` : cardBorder, cursor: "pointer", background: selectedSol === i ? "rgba(0,237,100,0.04)" : card }}>
                  {selectedSol === i && <div style={styles.infoCardAccent}></div>}
                  <div style={{ fontSize: 28, marginBottom: 12 }}>{s.icon}</div>
                  <div style={styles.cardLabel}>{s.badge}</div>
                  <div style={styles.cardTitle}>{s.name}</div>
                  <p style={styles.cardBody}>{s.desc}</p>
                  {selectedSol === i && (
                    <div style={{ marginTop: 18, paddingTop: 18, borderTop: `1px solid ${cardBorder}` }}>
                      {s.details.map((d, j) => (
                        <div key={j} style={{ display: "flex", gap: 8, fontSize: 13, color: text, marginBottom: 8, lineHeight: 1.6, fontStyle: "italic" }}>
                          <span style={{ color: green, flexShrink: 0 }}>→</span>{d}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={styles.archBox}>
              <div style={styles.archLabel}>// typical isolated architecture</div>
              <div style={styles.archSource}>App Traffic · BI Tools · Search · Batch Jobs · Analysts</div>
              <div style={{ textAlign: "center", color: muted, fontSize: 18, margin: "12px 0", fontStyle: "italic" }}>↓ routed by workload type</div>
              <div style={styles.archNodes}>
                {[["Primary", "OLTP Writes + Reads", green], ["Analytics Node", "BI / Reporting", "#4DB8FF"], ["Search Node", "Full-Text / Vector", "#FFB347"], ["Online Archive", "Historical Data", muted]].map(([label, name, color]) => (
                  <div key={label} style={{ ...styles.archNode, borderColor: color }}>

                  <div style={styles.metricNum}>{num}</div>
                  <div style={styles.metricLabel}>{label}</div>
                  <p style={styles.cardBody}>{desc}</p>
                </div>
              ))}
            </div>

            <div style={styles.beforeAfter}>
              <div>
                <div style={{ ...styles.baHead, color: "#FF6B6B", borderBottomColor: "rgba(255,107,107,0.3)" }}>❌ Before Atlas Workload Isolation</div>
                {["Analytics queries crash production during peak hours", "Nightly ETL to warehouse — analysts work with day-old data", "Separate Elasticsearch cluster to sync and maintain", "Over-provisioned primary cluster to absorb all workloads", "Three teams, three platforms, three data copies", "SLA violations when scheduled reports run"].map(t => (
                  <div key={t} style={styles.baItem}><span>🔴</span>{t}</div>
                ))}
              </div>
              <div>
                <div style={{ ...styles.baHead, color: green, borderBottomColor: "rgba(0,237,100,0.3)" }}>✅ After Atlas Workload Isolation</div>
                {["Analytics nodes absorb all heavy reads — OLTP unaffected", "Analysts query live data with sub-second replication lag", "Atlas Search nodes replace Elasticsearch entirely", "Each tier sized and billed independently", "One Atlas cluster, one driver, one data model", "Guaranteed SLA with resource isolation by design"].map(t => (
                  <div key={t} style={styles.baItem}><span>🟢</span>{t}</div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* TAB 3: DISCOVERY */}
        {activeTab === 3 && (
          <div>
            <div style={styles.sectionTitle}>Discovery Questions</div>
            <div style={{ ...styles.infoCard, borderLeft: `3px solid ${green}`, borderRadius: "0 6px 6px 0", marginBottom: 28 }}>
              <p style={{ ...styles.cardBody, color: muted }}>Use these questions to uncover pain, quantify impact, and build urgency. Hover any question and click <strong>copy</strong> to grab it for your call notes.</p>
            </div>
            {qSections.map((sec, i) => (
              <div key={i} style={styles.qAccordion}>
                <div style={{ ...styles.qHeader, ...(openQ === i ? styles.qHeaderOpen : {}) }} onClick={() => setOpenQ(openQ === i ? -1 : i)}>
                  <span style={styles.qHeaderIcon}>{sec.icon}</span>
                  <span style={styles.qHeaderTitle}>{sec.title}</span>
                  <span style={styles.qHeaderCount}>{sec.qs.length} questions</span>
                  <span style={{ color: muted, fontSize: 12 }}>{openQ === i ? "▲" : "▼"}</span>
                </div>
                {openQ === i && (
                  <div style={styles.qList}>
                    {sec.qs.map((q, j) => (
                      <div key={j} style={styles.qItem} onMouseEnter={e => e.currentTarget.style.background = "rgba(0,237,100,0.05)"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <span style={styles.qBullet}></span>
                        <span style={styles.qText}>"{q}"</span>
                        <button style={styles.qCopy} onClick={() => copyQ(q)}>copy</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

      </div>

      {/* FOOTER */}
      <div style={styles.footer}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ opacity: 0.5, display: "flex", alignItems: "center" }} dangerouslySetInnerHTML={{__html: `<svg width="16" height="16" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128.0 13.0 C128.0 13.0 61.0 88.5 61.0 152.0 C61.0 188.0 91.5 217.0 128.0 217.0 C164.5 217.0 195.0 188.0 195.0 152.0 C195.0 88.5 128.0 13.0 128.0 13.0 Z" fill="#00ED64"/><rect x="122" y="210" width="12" height="40" rx="6" fill="#00ED64"/></svg>`}} />
          <span style={styles.footerText}>MongoDB Atlas — Workload Isolation</span>
        </div>
        <span style={styles.footerText}>Solutions Architecture</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
