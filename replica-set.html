// ── Live SVG Simulation ──────────────────────────────────────────────
function ReplicaSimulation() {
  const [nodes, setNodes] = React.useState([
    { id: 0, name: "mongo-01", role: "primary",   status: "up" },
    { id: 1, name: "mongo-02", role: "secondary", status: "up" },
    { id: 2, name: "mongo-03", role: "secondary", status: "up" },
  ]);
  const [log, setLog] = React.useState([{ msg: "▶ Replica set initialized. 1 Primary, 2 Secondaries online.", type: "ok" }]);
  const [writeCount, setWriteCount] = React.useState(0);
  const [failed, setFailed] = React.useState(false);
  const logRef = React.useRef(null);

  React.useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);

  const addLog = (msg, type = "") => setLog(prev => [...prev, { msg, type }]);

  const ts = () => new Date().toLocaleTimeString("en-US", { hour12: false });

  const simWrite = () => {
    const primary = nodes.find(n => n.role === "primary" && n.status === "up");
    if (!primary) { addLog(`[${ts()}] ✗ No primary available. Writes blocked.`, "err"); return; }
    const next = writeCount + 1;
    setWriteCount(next);
    addLog(`[${ts()}] ✓ Write accepted by ${primary.name} (Primary) — {_id: ${next}, ts: ${Date.now()}}`, "ok");
    const secs = nodes.filter(n => n.role === "secondary" && n.status === "up");
    setTimeout(() => secs.forEach(s => addLog(`[${ts()}]   ↳ Replicated to ${s.name} via oplog`, "")), 300);
  };

  const simRead = () => {
    const sec = nodes.find(n => n.role === "secondary" && n.status === "up");
    if (!sec) { addLog(`[${ts()}] No secondary available. Read falls back to primary.`, "warn"); return; }
    addLog(`[${ts()}] 📖 Read routed to ${sec.name} (Secondary) — offloading primary, latency: ~2ms`, "ok");
  };

  const simFailover = () => {
    if (failed) { addLog(`[${ts()}] Primary already down. Reset first.`, "warn"); return; }
    const primary = nodes.find(n => n.role === "primary");
    setFailed(true);
    setNodes(prev => prev.map(n => n.id === primary.id ? { ...n, status: "down" } : n));
    addLog(`[${ts()}] 💥 ${primary.name} is unreachable. Heartbeat timeout triggered.`, "err");
    addLog(`[${ts()}] ⏳ Election in progress... secondaries voting...`, "warn");
    setTimeout(() => {
      setNodes(prev => {
        const candidates = prev.filter(n => n.role === "secondary" && n.status === "up");
        if (candidates.length === 0) { addLog(`[${ts()}] ✗ No election possible — no majority.`, "err"); return prev; }
        addLog(`[${ts()}] 🗳️  ${candidates[0].name} elected as new Primary (majority vote).`, "ok");
        addLog(`[${ts()}] ✅ Replica set healthy. Writes resuming automatically.`, "ok");
        return prev.map(n => n.id === candidates[0].id ? { ...n, role: "primary" } : n);
      });
    }, 2500);
  };

  const simReset = () => {
    setNodes([
      { id: 0, name: "mongo-01", role: "primary",   status: "up" },
      { id: 1, name: "mongo-02", role: "secondary", status: "up" },
      { id: 2, name: "mongo-03", role: "secondary", status: "up" },
    ]);
    setFailed(false);
    setWriteCount(0);
    setLog([{ msg: "↺ Replica set reset. 1 Primary, 2 Secondaries online.", type: "ok" }]);
  };

  // Triangle positions (percentages)
  const positions = [
    { x: 50, y: 10 },
    { x: 14, y: 82 },
    { x: 86, y: 82 },
  ];

  const nodeColor = (n) => {
    if (n.status === "down") return { border: "#FF6960", bg: "rgba(255,105,96,0.08)", label: "#FF6960" };
    if (n.role === "primary") return { border: green, bg: "rgba(0,237,100,0.08)", label: green };
    return { border: cardBorder, bg: card, label: muted };
  };

  const nodeIcon = (n) => n.status === "down" ? "💀" : n.role === "primary" ? "👑" : "🗄️";
  const nodeRoleText = (n) => n.status === "down" ? "OFFLINE" : n.role.toUpperCase();

  const pairs = [[0,1],[0,2],[1,2]];

  return (
    <div>
      {/* SVG triangle */}
      <div style={{ position: "relative", width: "60%", margin: "0 auto", height: 260 }}>
        <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible" }}
             viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <filter id="glow2">
              <feGaussianBlur stdDeviation="0.8" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          {pairs.map(([a,b]) => {
            const alive = nodes[a].status !== "down" && nodes[b].status !== "down";
            return (
              <line key={`${a}-${b}`}
                x1={positions[a].x} y1={positions[a].y}
                x2={positions[b].x} y2={positions[b].y}
                stroke={alive ? "rgba(0,237,100,0.35)" : "rgba(255,105,96,0.25)"}
                strokeWidth="0.6"
                strokeDasharray={alive ? "none" : "4 4"}
              />
            );
          })}
          {pairs.map(([a,b]) => {
            const alive = nodes[a].status !== "down" && nodes[b].status !== "down";
            if (!alive) return null;
            return [0, 1.0].map(delay => (
              <circle key={`dot-${a}-${b}-${delay}`} r="0.6" fill={green} filter="url(#glow2)">
                <animateMotion dur="3s" repeatCount="indefinite" begin={`${delay}s`}
                  path={`M${positions[a].x},${positions[a].y} L${positions[b].x},${positions[b].y}`}/>
              </circle>
            ));
          })}
          {pairs.map(([a,b]) => {
            const alive = nodes[a].status !== "down" && nodes[b].status !== "down";
            if (!alive) return null;
            return [0.4, 1.3].map(delay => (
              <circle key={`rdot-${a}-${b}-${delay}`} r="0.6" fill="rgba(0,237,100,0.5)">
                <animateMotion dur="3.8s" repeatCount="indefinite" begin={`${delay}s`}
                  path={`M${positions[b].x},${positions[b].y} L${positions[a].x},${positions[a].y}`}/>
              </circle>
            ));
          })}
        </svg>

        {nodes.map((node, i) => {
          const c = nodeColor(node);
          return (
            <div key={node.id} style={{
              position:"absolute", left:`${positions[i].x}%`, top:`${positions[i].y}%`,
              transform:"translate(-50%,-50%)", display:"flex", flexDirection:"column",
              alignItems:"center", gap:8
            }}>
              <div style={{
                width:90, height:90, borderRadius:12, border:`2px solid ${c.border}`,
                background:c.bg, display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", gap:5,
                boxShadow: node.role==="primary" && node.status==="up" ? `0 0 24px rgba(0,237,100,0.2)` : "none"
              }}>
                <span style={{ fontSize:24 }}>{nodeIcon(node)}</span>
                <span style={{ fontFamily:"monospace", fontSize:9, letterSpacing:1, color:c.label, textTransform:"uppercase" }}>
                  {nodeRoleText(node)}
                </span>
              </div>
              <span style={{ fontSize:11, fontWeight:600, color:text, whiteSpace:"nowrap" }}>{node.name}</span>
            </div>
          );
        })}
      </div>

      {/* Controls */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:20 }}>
        {[
          { label:"📝 Simulate Write", fn: simWrite, style:{ background:green, color:bg, border:`1px solid ${green}`, fontWeight:700 } },
          { label:"📖 Read from Secondary", fn: simRead, style:{ background:"transparent", color:green, border:`1px solid ${cardBorder}` } },
          { label:"💥 Kill Primary", fn: simFailover, style:{ background:"transparent", color:"#FF6960", border:"1px solid rgba(255,105,96,0.35)" } },
          { label:"↺ Reset", fn: simReset, style:{ background:"transparent", color:green, border:`1px solid ${cardBorder}` } },
        ].map(btn => (
          <button key={btn.label} onClick={btn.fn} style={{
            fontFamily:"monospace", fontSize:11, letterSpacing:1, textTransform:"uppercase",
            padding:"9px 18px", borderRadius:6, cursor:"pointer", ...btn.style
          }}>{btn.label}</button>
        ))}
      </div>

      {/* Log */}
      <div ref={logRef} style={{
        background:"#060F1E", border:`1px solid ${cardBorder}`, borderRadius:8,
        padding:14, marginTop:16, fontFamily:"monospace", fontSize:11,
        lineHeight:1.9, minHeight:80, maxHeight:130, overflowY:"auto"
      }}>
        {log.map((e,i) => (
          <div key={i} style={{ color: e.type==="ok" ? green : e.type==="err" ? "#FF6960" : e.type==="warn" ? "#FFC010" : muted }}>
            {e.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Write Concerns Table ─────────────────────────────────────────────
function WriteConcernsTable() {
  const rows = [
    { concern:"w: 1",        meaning:"Acknowledged by Primary only",            best:"Low-latency workloads, logs" },
    { concern:"w: majority", meaning:"Acknowledged by majority of voting nodes", best:"Financial data, orders, critical writes" },
    { concern:"w: 0",        meaning:"Fire-and-forget (no acknowledgement)",     best:"Metrics, high-volume analytics ingestion" },
    { concern:"j: true",     meaning:"Written to on-disk journal before ack",    best:"Compliance, strong durability requirements" },
  ];
  return (
    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14, marginTop:16 }}>
      <thead>
        <tr>
          {["Write Concern","Meaning","Best For"].map(h => (
            <th key={h} style={{ fontFamily:"monospace", fontSize:11, letterSpacing:1, textTransform:"uppercase",
              color:green, textAlign:"left", padding:"10px 14px", borderBottom:`1px solid ${cardBorder}` }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((r,i) => (
          <tr key={i}>
            <td style={{ padding:"12px 14px", borderBottom:`1px solid rgba(26,53,96,0.5)`, fontFamily:"monospace", color:green, fontSize:12 }}>{r.concern}</td>
            <td style={{ padding:"12px 14px", borderBottom:`1px solid rgba(26,53,96,0.5)`, color:muted }}>{r.meaning}</td>
            <td style={{ padding:"12px 14px", borderBottom:`1px solid rgba(26,53,96,0.5)`, color:muted }}>{r.best}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ── Election Steps ────────────────────────────────────────────────────
function ElectionViz() {
  const steps = [
    { icon:"💓", title:"Heartbeats", desc:"Every node pings every other node every 2 seconds." },
    { icon:"⚡", title:"Failure Detected", desc:"If a Secondary gets no heartbeat for electionTimeoutMillis (10s), it calls an election." },
    { icon:"🗳️", title:"Voting", desc:"Nodes vote for the candidate with the most up-to-date oplog. Majority needed to win." },
    { icon:"👑", title:"New Primary", desc:"Winning node becomes Primary. Drivers reconnect automatically. Writes resume." },
  ];
  return (
    <div style={{ display:"flex", gap:0, marginTop:20, flexWrap:"wrap" }}>
      {steps.map((s,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:0, flexWrap:"wrap" }}>
          <div style={{ background:card, border:`1px solid ${cardBorder}`, borderRadius:10, padding:"16px 20px",
            width:180, textAlign:"center", flexShrink:0 }}>
            <div style={{ fontSize:28, marginBottom:8 }}>{s.icon}</div>
            <div style={{ fontSize:13, fontWeight:700, color:text, marginBottom:6 }}>{s.title}</div>
            <div style={{ fontSize:12, color:muted, lineHeight:1.5 }}>{s.desc}</div>
          </div>
          {i < steps.length - 1 && (
            <div style={{ color:green, fontSize:20, padding:"0 8px", opacity:0.7 }}>→</div>
          )}
        </div>
      ))}
    </div>
  );
}

                "Listen for: 2am maintenance windows. Rolling upgrades eliminate these entirely.",

                "Listen for: ETL pipelines hammering production. A hidden secondary can serve analytics without impact.",

          fontFamily:"monospace", fontSize:10, color:green, letterSpacing:2, textTransform:"uppercase", marginBottom:16 }}>
          High Availability
        </div>
        <h1 style={{ fontSize:"clamp(28px,5vw,46px)", fontWeight:700, lineHeight:1.2, marginBottom:14, letterSpacing:-1 }}>
          Replica Sets Explained
        </h1>
        <p style={{ fontSize:16, color:muted, lineHeight:1.7, maxWidth:640, marginBottom:40 }}>
          MongoDB's built-in mechanism for automatic failover, data redundancy, and zero-downtime maintenance —
          the foundation of every production deployment.
        </p>
      </div>

      {/* Nav */}
      <div style={{ padding:"0 40px", maxWidth:900, margin:"0 auto" }}>
        <div style={{ display:"flex", gap:4, borderBottom:`1px solid ${cardBorder}`, overflowX:"auto",
          scrollbarWidth:"none", marginBottom:32 }}>
          {sections.map(s => (
            <button key={s.id} onClick={() => setActiveSection(s.id)} style={{
              fontFamily:"monospace", fontSize:11, letterSpacing:1, textTransform:"uppercase",
              padding:"10px 16px", border:"none", background:"transparent", cursor:"pointer",
              color: activeSection === s.id ? green : muted,
              borderBottom: activeSection === s.id ? `2px solid ${green}` : "2px solid transparent",
              marginBottom:-1, whiteSpace:"nowrap", transition:"color 0.2s"
            }}>
              {s.icon} {s.label}
            </button>
          ))}
        </div>

        {/* Section content */}
        <div style={{ maxWidth:860, paddingBottom:60 }}>
          <div style={{ fontSize:11, fontFamily:"monospace", letterSpacing:2, textTransform:"uppercase",
            color:green, marginBottom:12, opacity:0.7 }}>{current.icon} {current.label}</div>
          <h2 style={{ fontSize:"clamp(18px,3vw,28px)", fontWeight:700, marginBottom:16, lineHeight:1.3, letterSpacing:-0.5 }}>
            {current.headline}
          </h2>

          {current.body && (
            <p style={{ fontSize:15, color:muted, lineHeight:1.8, marginBottom: current.callout ? 20 : 0 }}>
              {current.body}
            </p>
          )}

          {current.callout && (
            <div style={{ borderLeft:`3px solid ${green}`, padding:"14px 20px", background:"rgba(0,237,100,0.05)",
              borderRadius:"0 8px 8px 0", fontSize:14, color:muted, lineHeight:1.7, marginBottom:8 }}>
              {current.callout}
            </div>
          )}

          {renderVisual(current)}
        </div>
      </div>

      {/* Footer */}
      <div style={{ textAlign:"center", padding:"30px 24px", fontFamily:"monospace", fontSize:11,
        color:"#2A4060", letterSpacing:1, borderTop:`1px solid ${cardBorder}` }}>
        MONGODB · SOLUTIONS ARCHITECT TOOLKIT · REPLICA SETS
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
